<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinified — Voice Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #070b14;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 20px 32px;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-bottom: 1px solid rgba(99,102,241,0.15);
        }
        .logo {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 18px; color: white;
        }
        .header h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.5px; }
        .header span { font-size: 13px; color: #64748b; margin-top: 2px; }

        /* ── Main Layout ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            padding: 24px 16px 0;
        }

        /* ── Chat Transcript ── */
        #chatLog {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 16px;
            scrollbar-width: thin;
            scrollbar-color: #334155 transparent;
        }
        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.55;
            animation: fadeIn 0.3s ease;
        }
        .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg.agent {
            align-self: flex-start;
            background: #1e293b;
            border: 1px solid #334155;
            border-bottom-left-radius: 4px;
        }
        .msg .label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            opacity: 0.7;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* ── Controls Bar ── */
        .controls {
            padding: 20px 0 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        #recordBtn {
            width: 72px; height: 72px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(99,102,241,0.35);
            display: flex; align-items: center; justify-content: center;
        }
        #recordBtn:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(99,102,241,0.5); }
        #recordBtn.recording {
            background: linear-gradient(135deg, #ef4444, #f87171);
            box-shadow: 0 4px 20px rgba(239,68,68,0.4);
            animation: pulse 1.4s infinite;
        }
        #recordBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        #status {
            font-size: 13px;
            color: #64748b;
            font-style: italic;
            text-align: center;
        }

        /* ── Welcome Card ── */
        .welcome {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
        }
        .welcome h2 { font-size: 22px; color: #e2e8f0; margin-bottom: 8px; font-weight: 500; }
        .welcome p { font-size: 14px; line-height: 1.6; }
        .chips {
            display: flex; flex-wrap: wrap; gap: 8px;
            justify-content: center; margin-top: 18px;
        }
        .chip {
            padding: 8px 16px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">P</div>
        <div>
            <h1>Pinified</h1>
            <span>AI Voice Assistant</span>
        </div>
    </div>

    <div class="main">
        <div id="chatLog">
            <div class="welcome" id="welcomeCard">
                <h2>Hi, I'm your Pinified assistant</h2>
                <p>I can help you with tariff rates, booking status, and more.<br>Tap the mic and start talking.</p>
                <div class="chips">
                    <div class="chip">Check booking status</div>
                    <div class="chip">Get tariff rates</div>
                    <div class="chip">Track shipment</div>
                    <div class="chip">Pickup schedule</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="recordBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>
            </button>
            <p id="status">Tap mic to start</p>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const chatLog = document.getElementById('chatLog');
        const welcomeCard = document.getElementById('welcomeCard');

        const MIC_ICON = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>`;
        const STOP_ICON = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2" ry="2"></rect></svg>`;
        const WAIT_ICON = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`;

        function addMessage(text, role) {
            if (welcomeCard) welcomeCard.style.display = 'none';
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            const label = role === 'user' ? 'You' : 'Pinified AI';
            div.innerHTML = `<div class="label">${label}</div>${text}`;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        async function setupMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                status.innerText = 'Ready — tap mic to speak';

                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    status.innerText = 'Processing...';
                    recordBtn.disabled = true;
                    recordBtn.innerHTML = WAIT_ICON;

                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioChunks = [];

                    const formData = new FormData();
                    formData.append('file', audioBlob, 'audio.webm');

                    try {
                        const response = await fetch('/talk', {
                            method: 'POST',
                            body: formData
                        });

                        if (!response.ok) {
                            const errData = await response.json().catch(() => ({}));
                            throw new Error(errData.detail || response.statusText);
                        }

                        // Read transcription from response header
                        const userText = decodeURIComponent(response.headers.get('X-User-Text') || '...');
                        const agentText = decodeURIComponent(response.headers.get('X-Agent-Text') || '...');

                        addMessage(userText, 'user');
                        addMessage(agentText, 'agent');

                        const blob = await response.blob();
                        const audioUrl = URL.createObjectURL(blob);
                        const audio = new Audio(audioUrl);

                        status.innerText = 'Speaking...';

                        audio.onended = () => {
                            status.innerText = 'Listening...';
                            startRecording();
                        };
                        audio.play();
                    } catch (e) {
                        status.innerText = 'Error — tap mic to retry';
                        recordBtn.disabled = false;
                        recordBtn.innerHTML = MIC_ICON;
                        console.error(e);
                    }
                };
            } catch (err) {
                status.innerText = 'Microphone access denied';
                console.error(err);
            }
        }

        function startRecording() {
            if (mediaRecorder && mediaRecorder.state === 'inactive') {
                audioChunks = [];
                mediaRecorder.start();
                recordBtn.innerHTML = STOP_ICON;
                recordBtn.classList.add('recording');
                recordBtn.disabled = false;
                status.innerText = 'Listening... tap to stop';
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                recordBtn.classList.remove('recording');
            }
        }

        recordBtn.addEventListener('click', () => {
            if (!mediaRecorder) { setupMicrophone(); return; }
            if (mediaRecorder.state === 'inactive') {
                startRecording();
            } else {
                stopRecording();
            }
        });

        setupMicrophone();
    </script>
</body>
</html>
